<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b91c1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7f1d1d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#grad1)"/>
  
  <!-- Road -->
  <rect x="0" y="250" width="1200" height="150" fill="#4a5568"/>
  
  <!-- Road markings -->
  <line x1="0" y1="325" x2="1200" y2="325" stroke="#ffd700" stroke-width="4" stroke-dasharray="40,20"/>
  
  <!-- Pothole (damage) -->
  <circle cx="400" cy="300" r="40" fill="#1a202c" opacity="0.7"/>
  <ellipse cx="400" cy="295" rx="35" ry="25" fill="#2d3748"/>
  
  <!-- Building silhouette -->
  <rect x="50" y="100" width="120" height="150" fill="#2d3748"/>
  <rect x="70" y="130" width="20" height="30" fill="#fbbf24"/>
  <rect x="110" y="130" width="20" height="30" fill="#fbbf24"/>
  <rect x="70" y="170" width="20" height="30" fill="#fbbf24"/>
  <rect x="110" y="170" width="20" height="30" fill="#fbbf24"/>
  
  <!-- Street light (damaged) -->
  <rect x="950" y="50" width="15" height="250" fill="#4a5568"/>
  <circle cx="957.5" cy="40" r="25" fill="#666" opacity="0.5"/>
  
  <!-- Text overlay -->
  <text x="600" y="200" font-size="36" font-weight="bold" text-anchor="middle" fill="white" opacity="0.8">Street Maintenance</text>
  <text x="600" y="240" font-size="20" text-anchor="middle" fill="white" opacity="0.7">Report damaged roads and infrastructure</text>
</svg>