<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef2f2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed7d7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad2)"/>
  
  <!-- Road section -->
  <rect x="0" y="180" width="400" height="120" fill="#4a5568"/>
  
  <!-- Yellow line -->
  <line x1="0" y1="240" x2="400" y2="240" stroke="#fbbf24" stroke-width="3" stroke-dasharray="25,15"/>
  
  <!-- Pothole illustration -->
  <ellipse cx="150" cy="220" rx="35" ry="30" fill="#1a202c" opacity="0.8"/>
  <ellipse cx="150" cy="215" rx="30" ry="20" fill="#2d3748"/>
  
  <!-- Crack lines -->
  <line x1="250" y1="200" x2="300" y2="250" stroke="#8b5a3c" stroke-width="2" opacity="0.6"/>
  <line x1="280" y1="200" x2="320" y2="250" stroke="#8b5a3c" stroke-width="2" opacity="0.6"/>
  
  <!-- Street light pole -->
  <rect x="360" y="80" width="10" height="150" fill="#4a5568"/>
  <circle cx="365" cy="70" r="18" fill="#dc2626" opacity="0.6"/>
  <text x="365" y="75" font-size="24" text-anchor="middle" fill="white" opacity="0.8">!</text>
  
  <!-- Sky/background -->
  <rect width="400" height="180" fill="#e8f4f8"/>
  
  <!-- Icon for report type -->
  <circle cx="350" cy="40" r="30" fill="#b91c1c" opacity="0.7"/>
  <text x="350" y="50" font-size="32" font-weight="bold" text-anchor="middle" fill="white">⚠</text>
  
  <!-- Label -->
  <text x="200" y="290" font-size="14" text-anchor="middle" fill="#374151" font-weight="bold">Click to view report details</text>
</svg>