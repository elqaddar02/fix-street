name: Deploy Laravel to InfinityFree

on:
  push:
    branches: [main]

concurrency:
  group: deploy-infinityfree
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set git file modification times
        uses: chetan/git-restore-mtime-action@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, fileinfo, tokenizer
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend assets (Vite)
        run: |
          npm ci
          npm run build

      - name: Generate production .env
        run: |
          cat > .env << EOF
          APP_NAME="${{ secrets.APP_NAME }}"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}

          APP_LOCALE=en
          APP_FALLBACK_LOCALE=en
          APP_FAKER_LOCALE=en_US

          APP_MAINTENANCE_DRIVER=file
          BCRYPT_ROUNDS=12

          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          SESSION_DRIVER=file
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null

          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          CACHE_STORE=file

          MAIL_MAILER=log
          MAIL_FROM_ADDRESS="${{ secrets.MAIL_FROM_ADDRESS }}"
          MAIL_FROM_NAME="${{ secrets.APP_NAME }}"

          VITE_APP_NAME="${{ secrets.APP_NAME }}"
          EOF

      - name: Cache Laravel config/routes/views
        run: |
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Cache FTP Sync State
        uses: actions/cache@v4
        with:
          path: .ftp_cache
          key: ftp-cache-${{ github.sha }}
          restore-keys: |
            ftp-cache-

      - name: Prepare InfinityFree folder layout
        run: |
          set -e

          rm -rf deploy_web deploy_core
          mkdir -p deploy_web
          mkdir -p deploy_core
          mkdir -p .ftp_cache

          # Core Laravel app goes into deploy_core
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='public' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='database/database.sqlite' \
            ./ deploy_core/

          # Web root goes into deploy_web
          rsync -a public/ deploy_web/

          # Production entry point + rewrite rules
          cp public/index.php.deploy deploy_web/index.php
          cp public/.htaccess.deploy deploy_web/.htaccess

          # Block web access to laravel_core (uploaded separately, but protected just in case)
          # FIXED: Removed the invalid mkdir line that threw the error
          cp deploy/laravel_core.htaccess deploy_core/.htaccess || echo "Deny from all" > deploy_core/.htaccess

          # Production env config
          
          cp .env deploy_core/env-config.txt

          # Storage symlink workaround
          mkdir -p deploy_web/storage
          if [ -d "storage/app/public" ] && [ "$(ls -A storage/app/public 2>/dev/null)" ]; then
            cp -rp storage/app/public/. deploy_web/storage/
          fi

          # Ensure writable framework directories exist
          mkdir -p deploy_core/storage/framework/{cache,sessions,views}
          mkdir -p deploy_core/storage/logs
          mkdir -p deploy_core/bootstrap/cache

      - name: Show deploy bundle structure
        run: |
          echo "web root (deploy_web):"
          ls -la deploy_web | head -20
          echo ""
          echo "laravel_core (deploy_core):"
          ls -la deploy_core | head -20

      - name: Show deploy bundle size
        run: |
          echo "Web root bundle size:"
          du -sh deploy_web
          echo "Laravel Core bundle size:"
          du -sh deploy_core

      - name: Prepare FTP directories
        run: |
          HOST="${{ secrets.FTP_SERVER }}"
          HOST="${HOST#ftp://}"
          HOST="${HOST#ftps://}"
          HOST="${HOST%/}"
          echo "FTP_HOST=${HOST}" >> $GITHUB_ENV

          BASE="${{ secrets.FTP_SERVER_DIR }}"
          BASE="${BASE:-/}"
          BASE="${BASE%/}/"
          echo "FTP_WEB_DIR=${BASE}" >> $GITHUB_ENV
          echo "FTP_CORE_DIR=${BASE}laravel_core/" >> $GITHUB_ENV

      - name: Test FTP connection
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          curl -v --ftp-pasv --connect-timeout 60 --max-time 120 \
            -u "$FTP_USERNAME:$FTP_PASSWORD" \
            "ftp://${FTP_HOST}/" || {
              echo "::error::FTP connection failed."
              exit 1
            }

      - name: Deploy web root via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./deploy_web/
          server-dir: ${{ env.FTP_WEB_DIR }}
          state-name: ../.ftp_cache/web-sync.json
          timeout: 300000
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.DS_Store
            **/Thumbs.db

      - name: Deploy Laravel core via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./deploy_core/
          server-dir: ${{ env.FTP_CORE_DIR }}
          state-name: ../.ftp_cache/core-sync.json
          timeout: 600000
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.DS_Store
            **/Thumbs.db
            storage/logs/**
            storage/framework/cache/data/**
            storage/framework/sessions/**