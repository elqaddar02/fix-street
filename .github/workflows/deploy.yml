name: Deploy Laravel to InfinityFree

on:
  push:
    branches: [main]

concurrency:
  group: deploy-infinityfree
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set git file modification times
        uses: chetan/git-restore-mtime-action@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, fileinfo, tokenizer
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend assets (Vite)
        run: |
          npm ci
          npm run build

      - name: Generate production .env
        run: |
          cat > .env << EOF
          APP_NAME="${{ secrets.APP_NAME }}"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}

          APP_LOCALE=en
          APP_FALLBACK_LOCALE=en
          APP_FAKER_LOCALE=en_US

          APP_MAINTENANCE_DRIVER=file
          BCRYPT_ROUNDS=12

          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          SESSION_DRIVER=file
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null

          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          CACHE_STORE=file

          MAIL_MAILER=log
          MAIL_FROM_ADDRESS="${{ secrets.MAIL_FROM_ADDRESS }}"
          MAIL_FROM_NAME="${{ secrets.APP_NAME }}"

          VITE_APP_NAME="${{ secrets.APP_NAME }}"
          EOF

      - name: Cache Laravel config/routes/views
        run: |
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Cache FTP Sync State
        uses: actions/cache@v4
        with:
          path: .ftp_cache
          key: ftp-cache-${{ github.sha }}
          restore-keys: |
            ftp-cache-

      - name: Prepare InfinityFree folder layout
        run: |
          set -e

          rm -rf deploy_combined
          mkdir -p deploy_combined/laravel_core
          mkdir -p .ftp_cache

          # 1. Core Laravel app goes into deploy_combined/laravel_core
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='public' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='database/database.sqlite' \
            ./ deploy_combined/laravel_core/

          # 2. Web root public items go into the base of deploy_combined
          rsync -a public/ deploy_combined/

          # 3. Production entry points + rewrite rules
          cp public/index.php.deploy deploy_combined/index.php
          cp public/.htaccess.deploy deploy_combined/.htaccess

          # 4. Block web access to laravel_core
          cp deploy/laravel_core.htaccess deploy_combined/laravel_core/.htaccess || echo "Deny from all" > deploy_combined/laravel_core/.htaccess

          # 5. Production safe env config file
          cp .env deploy_combined/laravel_core/env-config.txt

          # 6. Storage symlink workaround
          mkdir -p deploy_combined/storage
          if [ -d "storage/app/public" ] && [ "$(ls -A storage/app/public 2>/dev/null)" ]; then
            cp -rp storage/app/public/. deploy_combined/storage/
          fi

          # 7. Ensure framework write directories exist locally
          mkdir -p deploy_combined/laravel_core/storage/framework/{cache,sessions,views}
          mkdir -p deploy_combined/laravel_core/storage/logs
          mkdir -p deploy_combined/laravel_core/bootstrap/cache

          # 8. Restore the cached tracking state to the bundle root
          cp .ftp_cache/combined-sync.json deploy_combined/combined-sync.json || echo "{}" > deploy_combined/combined-sync.json

      - name: Prepare FTP directories
        run: |
          HOST="${{ secrets.FTP_SERVER }}"
          HOST="${HOST#ftp://}"
          HOST="${HOST#ftps://}"
          HOST="${HOST%/}"
          echo "FTP_HOST=${HOST}" >> $GITHUB_ENV

          BASE="${{ secrets.FTP_SERVER_DIR }}"
          BASE="${BASE:-/}"
          BASE="${BASE%/}/"
          echo "FTP_WEB_DIR=${BASE}" >> $GITHUB_ENV

      - name: Test FTP connection
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          curl -v --ftp-pasv --connect-timeout 60 --max-time 120 \
            -u "$FTP_USERNAME:$FTP_PASSWORD" \
            "ftp://${FTP_HOST}/" || {
              echo "::error::FTP connection failed."
              exit 1
            }

      - name: Deploy Everything via Single Pass FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./deploy_combined/
          server-dir: ${{ env.FTP_WEB_DIR }}
          state-name: combined-sync.json
          timeout: 900000
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.DS_Store
            **/Thumbs.db
            laravel_core/storage/logs/**
            laravel_core/storage/framework/cache/data/**
            laravel_core/storage/framework/sessions/**

      - name: Save sync state to cache
        if: always()
        run: |
          cp deploy_combined/combined-sync.json .ftp_cache/combined-sync.json || true