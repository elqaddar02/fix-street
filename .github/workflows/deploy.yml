name: Deploy Laravel to InfinityFree

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: 📂 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql
          coverage: none

      - name: 🔨 Install PHP Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: 📂 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔨 Install & Build Assets (Vite)
        run: |
          npm install
          npm run build

      - name: 🚀 Sync Files via FTP
        uses: SebastianSchildt/ftp-deploy-action@v2.0.0
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          LOCAL_DIR: ./
          REMOTE_DIR: /htdocs/
          # Exclude files to save time and avoid errors
          ARGS: --exclude .git/ --exclude node_modules/ --exclude tests/
