name: Deploy Laravel to InfinityFree

on:
  push:
    branches: [main]

concurrency:
  group: deploy-infinityfree
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, fileinfo, tokenizer
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend assets (Vite)
        run: |
          npm ci
          npm run build

      - name: Generate production .env
        run: |
          cat > .env << EOF
          APP_NAME="${{ secrets.APP_NAME }}"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}

          APP_LOCALE=en
          APP_FALLBACK_LOCALE=en
          APP_FAKER_LOCALE=en_US

          APP_MAINTENANCE_DRIVER=file
          BCRYPT_ROUNDS=12

          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          SESSION_DRIVER=file
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null

          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          CACHE_STORE=file

          MAIL_MAILER=log
          MAIL_FROM_ADDRESS="${{ secrets.MAIL_FROM_ADDRESS }}"
          MAIL_FROM_NAME="${{ secrets.APP_NAME }}"

          VITE_APP_NAME="${{ secrets.APP_NAME }}"
          EOF

      - name: Cache Laravel config/routes/views
        run: |
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Prepare InfinityFree folder layout
        run: |
          set -e

          rm -rf deploy_temp
          mkdir -p deploy_temp/laravel_core
          mkdir -p deploy_temp/deploy-cache

          # Core Laravel app (everything except public/, dev folders, and git metadata)
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='public' \
            --exclude='deploy_temp' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='database/database.sqlite' \
            ./ deploy_temp/laravel_core/

          # Web root = deploy_temp/ (FTP uploads directly into htdocs)
          rsync -a public/ deploy_temp/

          # Production entry point + rewrite rules
          cp public/index.php.deploy deploy_temp/index.php
          cp public/.htaccess.deploy deploy_temp/.htaccess

          # Block web access to laravel_core
          cp deploy/laravel_core.htaccess deploy_temp/laravel_core/.htaccess

          # Production env (InfinityFree often blocks uploading ".env" via FTP)
          cp .env deploy_temp/laravel_core/production.env

          # Storage symlink workaround: expose public disk files under web root /storage/
          mkdir -p deploy_temp/storage
          if [ -d "storage/app/public" ] && [ "$(ls -A storage/app/public 2>/dev/null)" ]; then
            cp -rp storage/app/public/. deploy_temp/storage/
          fi

          # Ensure writable framework directories exist
          mkdir -p deploy_temp/laravel_core/storage/framework/{cache,sessions,views}
          mkdir -p deploy_temp/laravel_core/storage/logs
          mkdir -p deploy_temp/laravel_core/bootstrap/cache

          # Remove dev artifacts from upload bundle
          rm -rf deploy_temp/laravel_core/node_modules

      - name: Show deploy bundle structure
        run: |
          echo "web root (deploy_temp):"
          ls -la deploy_temp | head -20
          echo ""
          echo "laravel_core:"
          ls -la deploy_temp/laravel_core | head -20

      - name: Show deploy bundle size
        run: |
          echo "Total deploy bundle size:"
          du -sh deploy_temp
          echo "laravel_core/vendor size:"
          du -sh deploy_temp/laravel_core/vendor || true

      - name: Prepare FTP directories
        run: |
          BASE="${{ secrets.FTP_SERVER_DIR }}"
          BASE="${BASE:-/}"
          BASE="${BASE%/}/"
          echo "FTP_WEB_DIR=${BASE}" >> $GITHUB_ENV
          echo "FTP_CORE_DIR=${BASE}laravel_core/" >> $GITHUB_ENV
          echo "Using FTP web dir: ${BASE}"
          echo "Using FTP core dir: ${BASE}laravel_core/"

      - name: Test FTP connection
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "Testing FTP login to: $FTP_SERVER"
          curl -v --ftp-pasv --connect-timeout 60 --max-time 120 \
            -u "$FTP_USERNAME:$FTP_PASSWORD" \
            "ftp://${FTP_SERVER}/" || {
              echo "::error::FTP connection failed. Check FTP_SERVER, FTP_USERNAME, FTP_PASSWORD secrets."
              echo "InfinityFree: use the hostname from Control Panel → FTP Details (not localhost)."
              exit 1
            }

      - name: Deploy web root via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./deploy_temp/
          server-dir: ${{ env.FTP_WEB_DIR }}
          state-name: deploy-cache/web-sync.json
          timeout: 300000
          log-level: verbose
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/.DS_Store
            **/Thumbs.db
            **/.env
            **/.env.*
            storage/**
            laravel_core/**

      - name: Deploy Laravel core via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./deploy_temp/laravel_core/
          server-dir: ${{ env.FTP_CORE_DIR }}
          state-name: deploy-cache/core-sync.json
          timeout: 700000
          log-level: verbose
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/node_modules/**
            **/tests/**
            **/.DS_Store
            **/Thumbs.db
            **/.env
            **/.env.*
            storage/logs/**
            storage/framework/cache/data/**
            storage/framework/sessions/**
